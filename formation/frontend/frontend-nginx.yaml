AWSTemplateFormatVersion: '2010-09-09'
Description: Frontend stack with Nginx reverse proxy and Node.js app

Parameters:
  AmiId:
    Type: AWS::EC2::Image::Id

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName

  InstanceType:
    Type: String
    Default: t3.micro

Resources:

  FrontendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Frontend SG
      VpcId: !ImportValue mini-news-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !ImportValue mini-news-alb-sg-id
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  FrontendLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref FrontendSecurityGroup
        UserData:
          Fn::Base64:
            Fn::Sub:
              - |
                #!/bin/bash
                set -eux

                yum update -y
                yum install -y nodejs npm nginx

                mkdir -p /opt/frontend
                cd /opt/frontend

                cat > index.js <<'EOF'
                const http = require('http');

                const BACKEND_URL = "__BACKEND_URL__";
                const LM_URL = "__LM_URL__";

                const server = http.createServer(async (req, res) => {
                  res.writeHead(200, {'Content-Type': 'text/html'});

                  res.end(`
                    "<h1>Mini News Frontend</h1>" +
                    "<p>Backend: " + BACKEND_URL + </p>" +
                    "<p>Layout Manager: " + LM_URL + "</p>"
                  `);
                });

                server.listen(3000, '0.0.0.0', () => {
                  console.log("Frontend running");
                });
                EOF

                sed -i 's|__BACKEND_URL__|${BackendUrl}|g' /opt/frontend/index.js
                sed -i 's|__LM_URL__|${LmUrl}|g' /opt/frontend/index.js

                cat > /etc/systemd/system/frontend.service <<'EOF'
                [Unit]
                Description=Frontend App
                After=network.target

                [Service]
                ExecStart=/usr/bin/node /opt/frontend/index.js
                Restart=always

                [Install]
                WantedBy=multi-user.target
                EOF

                systemctl daemon-reexec
                systemctl daemon-reload
                systemctl enable frontend
                systemctl start frontend

                cat > /etc/nginx/conf.d/frontend.conf <<'EOF'
                server {
                    listen 80;

                    location / {
                        proxy_pass http://127.0.0.1:3000;
                    }
                }
                EOF

                systemctl enable nginx
                systemctl restart nginx

              - {
                  BackendUrl: { "Fn::ImportValue": "mini-news-backend-base-url" },
                  LmUrl: { "Fn::ImportValue": "mini-news-layout-manager-base-url" }
                }

  FrontendASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: '1'
      MaxSize: '2'
      DesiredCapacity: '1'
      VPCZoneIdentifier:
        - !ImportValue mini-news-public-subnet-a
      LaunchTemplate:
        LaunchTemplateId: !Ref FrontendLaunchTemplate
        Version: !GetAtt FrontendLaunchTemplate.LatestVersionNumber
      TargetGroupARNs:
        - !ImportValue mini-news-frontend-tg-arn